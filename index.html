<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

      content="width=device-width,

  <link rel="icon" type="image/png" href="https://images.squarespace-cdn.com/content/678bfe166e648e33c9788a6c/3eb0cef0-42fb-4fa5-a6d4-6151639240ca/logo+final+final-06.png" sizes="32x32">
  <link rel="apple-touch-icon" href="https://images.squarespace-cdn.com/content/678bfe166e648e33c9788a6c/3eb0cef0-42fb-4fa5-a6d4-6151639240ca/logo+final+final-06.png" sizes="180x180">
  <title>Explore Your Options - Click & Frame</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      min-height: 100vh;
      text-align: center;
      overflow-x: hidden;
      box-sizing: border-box;
    }

    *, *::before, *::after {
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-image: url('https://images.squarespace-cdn.com/content/678bfe166e648e33c9788a6c/bc78b4ef-b335-4042-a721-0dc7ea63f059/Doc+page+background.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #ffffff;
      position: relative;
      width: 100vw;
      padding: 20px;
    }

    .logo {
      position: absolute;
      top: 20px;
      left: 20px;
      width: auto;
      height: 100px;
      z-index: -1;
    }

    .chat-container-wrapper {
      position: relative;
      width: 90vw;
      max-width: 600px;
      margin: 0 auto;
      text-align: left;
    }

    .chat-glow {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 24px;
      background: linear-gradient(135deg, #00ffff, #ff00ff, #00ffff);
      background-size: 300% 300%;
      animation: colorPulse 8s ease infinite, brightnessPulse 3s ease-in-out infinite;
      filter: blur(60px);
      opacity: 0.8;
      will-change: filter, opacity;
      z-index: 0;
    }

    .chat-container {
      position: relative;
      width: 100%;
      padding: 20px;
      background: #000;
      border-radius: 20px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      overflow: hidden;
      z-index: 1;
      text-align: left;
      min-width: 300px;
    }

    @keyframes colorPulse {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes brightnessPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .bot-message {
      background: #f4f4f4;
      color: #333;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 15px;
      line-height: 1.6;
    }

    .hero-title {
      font-size: 28px;
      line-height: 1.2;
      margin: 0 0 14px 0;
      font-weight: 700;
      color: #111;
    }

    .hero-text {
      font-size: 16px;
      margin: 0 0 18px 0;
      color: #333;
    }

    .hero-highlight {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 8px 0;
      color: #ff8a65;
    }

    .hero-subtle {
      font-size: 14px;
      margin: 0;
      color: #666;
    }

    .step-label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .question-title {
      font-size: 26px;
      line-height: 1.2;
      margin: 0;
      color: #111;
      font-weight: 700;
    }

    .question-note {
      font-size: 14px;
      color: #666;
      margin-top: 10px;
    }

    .user-input {
      margin-bottom: 20px;
    }

    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .options button,
    .primary-button,
    .secondary-button {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      transition: background 0.2s ease, transform 0.12s ease, opacity 0.2s ease;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
      appearance: none;
      -webkit-appearance: none;
    }

    .option-btn {
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
      outline: none;
    }

    .option-btn.selected {
      background: #E63900 !important;
      color: #ffffff !important;
      transform: scale(0.97) !important;
      opacity: 1 !important;
    }

    .option-btn:focus,
    .option-btn:active,
    .option-btn:focus-visible,
    .primary-button:focus,
    .primary-button:active,
    .primary-button:focus-visible,
    .secondary-button:focus,
    .secondary-button:active,
    .secondary-button:focus-visible,
    .submit-button:focus,
    .submit-button:active,
    .submit-button:focus-visible {
      outline: none;
      box-shadow: none;
    }

    @media (hover: hover) and (pointer: fine) {
      .options button:hover,
      .primary-button:hover,
      .secondary-button:hover,
      .submit-button:hover {
        background: #cc3300;
        transform: translateY(-1px);
      }

      .footer a:hover {
        text-decoration: underline;
      }

      .back-button:hover {
        padding: 5px 6px;
        background: rgba(230,57,0,0);
      }
    }

    .primary-button {
      background-color: #E63900;
      width: 100%;
      justify-content: center;
      display: inline-flex;
      align-items: center;
    }

    .secondary-button {
      background: rgba(255,255,255,0.08);
      font-size: 14px;
      padding: 10px 16px;
    }

    .input-group {
      display: flex;
      gap: 10px;
    }

    .input-group input,
    .single-input,
    .contact-fields input,
    .contact-fields textarea {
      width: 100%;
      padding: 12px 14px;
      background: #ffffff;
      border: 1px solid #ccc;
      border-radius: 8px;
      color: #333;
      font-size: 16px;
      outline: none;
      min-width: 0;
      font-family: inherit;
    }

    .input-group input::placeholder,
    .single-input::placeholder,
    .contact-fields input::placeholder,
    .contact-fields textarea::placeholder {
      color: #666;
    }

    .contact-fields {
      display: grid;
      gap: 14px;
    }

    .field-group {
      display: grid;
      gap: 6px;
    }

    .field-group label {
      font-size: 14px;
      color: #fff;
      font-weight: 600;
    }

    .field-note {
      font-size: 12px;
      color: #bbb;
      margin-top: -2px;
    }

    .textarea-input {
      min-height: 120px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .submit-button {
      background-color: #E63900;
      border-radius: 8px;
      color: #fff;
      padding: 12px 20px;
      margin-left: 3px;
      font-size: 16px;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .loading {
      display: none;
      text-align: center;
      margin: 10px 0;
    }

    .loading.active {
      display: block;
    }

    .error {
      color: #ffb3b3;
      margin-bottom: 10px;
      display: none;
      background: rgba(255, 70, 70, 0.12);
      border: 1px solid rgba(255, 70, 70, 0.28);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .error.active {
      display: block;
    }

    .success-box {
      background: #f4f4f4;
      color: #333;
      padding: 22px;
      border-radius: 8px;
      line-height: 1.6;
    }

    .success-box h2 {
      margin-top: 0;
      margin-bottom: 10px;
      color: #111;
      font-size: 26px;
    }

    .success-box p {
      margin-bottom: 0;
    }

    .progress {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }

    .progress-dot {
      flex: 1;
      height: 6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
      transition: background 0.3s ease;
    }

    .progress-dot.active {
      background: #E63900;
    }

    .footer {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-top: 20px;
    }

    .footer a {
      color: #ffffff;
      text-decoration: none;
      margin: 0 10px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 480px) {
      .chat-container-wrapper {
        width: 90vw;
      }

      .logo {
        display: none;
      }

      .chat-container {
        padding: 15px;
        margin: 0px;
      }

      .options {
        flex-direction: column;
        align-items: stretch;
      }

      .options button {
        width: 100%;
        padding: 12px;
      }

      .chat-glow {
        filter: blur(30px);
      }

      .input-group input,
      .single-input,
      .contact-fields input,
      .contact-fields textarea {
        font-size: 16px;
      }

      .submit-button,
      .primary-button,
      .secondary-button {
        width: 100%;
      }

      .hero-title,
      .question-title,
      .success-box h2 {
        font-size: 24px;
      }

      .back-button {
        padding: 8px 12px;
        font-size: 10px;
        color: #c46749;
      }
    }

    @media (min-width: 481px) and (max-width: 768px) {
      .chat-container-wrapper {
        max-width: 550px;
        padding: 0 10px;
      }

      .logo {
        height: 70px;
        left: 10px;
        z-index: -1;
      }

      .chat-container {
        padding: 25px;
      }

      .options button {
        padding: 12px 20px;
      }

      .input-group input,
      .single-input,
      .contact-fields input,
      .contact-fields textarea {
        font-size: 16px;
      }

      .submit-button,
      .primary-button,
      .secondary-button {
        font-size: 16px;
      }

      .back-button {
        padding: 8px 16px;
        font-size: 12px;
        color: #c46749;
      }
    }

    @media screen and (orientation: landscape) and (max-height: 500px) {
      .logo {
        display: none;
      }

      body {
        align-items: flex-start;
        padding-top: 20px;
      }
    }

    @media (min-width: 769px) {
      .chat-container-wrapper {
        max-width: 600px;
      }

      .logo {
        height: 100px;
        z-index: -1;
      }

      .chat-container {
        padding: 20px;
      }

      .options button {
        padding: 10px 20px;
      }

      .input-group input,
      .single-input,
      .contact-fields input,
      .contact-fields textarea {
        font-size: 16px;
      }

      .submit-button,
      .primary-button,
      .secondary-button {
        font-size: 16px;
      }

      .back-button {
        padding: 8px 16px;
        font-size: 14px;
        color: #c46749;
      }
    }
  </style>

<body>
  <img src="https://images.squarespace-cdn.com/content/678bfe166e648e33c9788a6c/6cf171b9-9e57-4a60-949b-eff487b0f57e/Click%26Fram_Final-01.png" alt="Click & Frame Logo" class="logo">

  <div class="chat-container-wrapper">
    <div class="chat-glow"></div>

    <div class="chat-container">
      <div class="progress" aria-label="Form progress">
        <div class="progress-dot active" id="dot-1"></div>
        <div class="progress-dot" id="dot-2"></div>
        <div class="progress-dot" id="dot-3"></div>
        <div class="progress-dot" id="dot-4"></div>
      </div>

      <div id="error-message" class="error" aria-live="polite"></div>

      <div id="loading-spinner" class="loading">
        <img src="https://images.squarespace-cdn.com/content/678bfe166e648e33c9788a6c/a2b5a4e1-628e-4ae3-ade5-153626bfe394/Comp+1.gif" alt="Loading..." width="30">
      </div>

      <div id="step-content">
        <!-- Dynamic content injected by JavaScript -->
      </div>

      <div class="footer">
        <p>
          © 2026
          <a href="https://clickandframe.com" target="_blank" rel="noopener noreferrer">clickandframe.com</a>
          All rights reserved.
          <a href="https://clickandframe.com/privacy-policy" target="_blank" rel="noopener noreferrer">Privacy Policy</a>
        </p>
      </div>
    </div>
  </div>

  <script>
  const WEBHOOK_URL = "https://clickandframe.app.n8n.cloud/webhook/6c48b8f0-1cbc-4b95-8d8e-cf5743179f54";

  const state = {
    currentStep: 0,
    goal: "",
    projectType: "",
    extraInfo: "",
    name: "",
    email: "",
    phone: "",
    location: ""
  };

  const stepContent = document.getElementById("step-content");
  const errorMessage = document.getElementById("error-message");
  const loadingSpinner = document.getElementById("loading-spinner");

  function showError(message) {
    errorMessage.textContent = message;
    errorMessage.classList.add("active");
  }

  function clearError() {
    errorMessage.textContent = "";
    errorMessage.classList.remove("active");
  }

  function setLoading(isLoading) {
    if (isLoading) {
      loadingSpinner.classList.add("active");
    } else {
      loadingSpinner.classList.remove("active");
    }
  }

  function updateProgress(stepIndex) {
    const dots = [
      document.getElementById("dot-1"),
      document.getElementById("dot-2"),
      document.getElementById("dot-3"),
      document.getElementById("dot-4")
    ];

    dots.forEach((dot, index) => {
      if (!dot) return;
      if (stepIndex === 0) {
        dot.classList.toggle("active", index === 0);
      } else {
        dot.classList.toggle("active", index <= stepIndex - 1);
      }
    });
  }

  function escapeHtml(value) {
    if (!value) return "";
    return value
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function isValidEmail(email) {
    return /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[A-Za-z]{2,}$/.test(email);
  }

  function renderIntro() {
    updateProgress(0);

    stepContent.innerHTML = `
      <div class="bot-message" role="region" aria-live="polite">
        <h1 class="hero-title">TURN YOUR STORY INTO A FILM THAT DRIVES REAL IMPACT</h1>
        <p class="hero-text" style="margin-top: 0;">We create films that connect, engage, and move people to act.</p>
        <p class="hero-text" style="margin-top: 0;">Based in Austin, working with nonprofits, artists, and brands.</p>
        <p class="hero-highlight" style="margin-bottom: 0;">LIMITED AVAILABILITY: 50% OFF SELECT PROJECTS</p>
        <p class="hero-highlight" style="margin-top: 0;">FLEXIBLE 0% PAYMENT PLANS AVAILABLE</p>
        <p class="hero-subtle">Explore your options. Takes 30 seconds.</p>
      </div>

      <div class="user-input">
        <button class="primary-button" id="start-button" type="button">Explore your options</button>
      </div>

      <a
        href="https://clickandframe.com/start"
        class="back-button"
        role="link"
        aria-label="Back to Start page"
        style="color: #c46749; font-size: 10px;"
        target="_blank"
        rel="noopener noreferrer"
      >Having Trouble? Use the Form</a>
    `;

    document.getElementById("start-button").addEventListener("click", (event) => {
      event.currentTarget.blur();
      state.currentStep = 1;
      renderStep();
    });
  }

  function renderOptionsStep(stepNumber, totalSteps, questionTitle, options, stateKey, note = "") {
    updateProgress(stepNumber);

    stepContent.innerHTML = `
      <div class="bot-message" role="region" aria-live="polite">
        <div class="step-label">Question ${stepNumber} of ${totalSteps}</div>
        <h2 class="question-title">${questionTitle}</h2>
        ${note ? `<p class="question-note">${note}</p>` : ""}
      </div>

      <div class="user-input">
        <div class="options" role="group" aria-label="${questionTitle}">
          ${options.map(option => `
            <button
              type="button"
              class="option-btn"
              data-value="${option.replace(/"/g, "&quot;")}"
            >${option}</button>
          `).join("")}
        </div>

        <div class="button-row">
          <button type="button" class="secondary-button" id="back-button">Back</button>
        </div>
      </div>

      <a
        href="https://clickandframe.com/start"
        class="back-button"
        role="link"
        aria-label="Back to Start page"
        style="color: #c46749; font-size: 10px;"
        target="_blank"
        rel="noopener noreferrer"
      >Having Trouble? Use the Form</a>
    `;

    const optionButtons = document.querySelectorAll(".option-btn");

    optionButtons.forEach((button) => {
      button.addEventListener("click", (event) => {
        const clickedButton = event.currentTarget;

        optionButtons.forEach((btn) => {
          btn.disabled = true;
          btn.style.pointerEvents = "none";
          btn.classList.remove("selected");
        });

        clickedButton.classList.add("selected");
        state[stateKey] = clickedButton.getAttribute("data-value");

        setTimeout(() => {
          clickedButton.blur();
          state.currentStep += 1;
          renderStep();
        }, 220);
      });
    });

    document.getElementById("back-button").addEventListener("click", (event) => {
      event.currentTarget.blur();
      state.currentStep -= 1;
      renderStep();
    });
  }

  function renderExtraStep() {
    updateProgress(3);

    stepContent.innerHTML = `
      <div class="bot-message" role="region" aria-live="polite">
        <div class="step-label">Question 3 of 4</div>
        <h2 class="question-title">Anything else you’d like to share?</h2>
        <p class="question-note">Optional</p>
      </div>

      <div class="user-input">
        <textarea
          id="extra-info"
          class="single-input textarea-input"
          placeholder="Share anything helpful about your project..."
        >${escapeHtml(state.extraInfo)}</textarea>

        <div class="button-row">
          <button type="button" class="secondary-button" id="back-button">Back</button>
          <button type="button" class="primary-button" id="continue-button">Continue</button>
        </div>
      </div>

      <a
        href="https://clickandframe.com/start"
        class="back-button"
        role="link"
        aria-label="Back to Start page"
        style="color: #c46749; font-size: 10px;"
        target="_blank"
        rel="noopener noreferrer"
      >Having Trouble? Use the Form</a>
    `;

    document.getElementById("back-button").addEventListener("click", (event) => {
      event.currentTarget.blur();
      state.currentStep -= 1;
      renderStep();
    });

    document.getElementById("continue-button").addEventListener("click", (event) => {
      event.currentTarget.blur();
      state.extraInfo = document.getElementById("extra-info").value.trim();
      state.currentStep += 1;
      renderStep();
    });
  }

  function renderContactStep() {
    updateProgress(4);

    stepContent.innerHTML = `
      <div class="bot-message" role="region" aria-live="polite">
        <div class="step-label">Question 4 of 4</div>
        <h2 class="question-title">Where should we send your details?</h2>
      </div>

      <div class="user-input">
        <form id="contact-form" novalidate>
          <div class="contact-fields">
            <div class="field-group">
              <label for="name">Name</label>
              <input
                type="text"
                id="name"
                name="name"
                value="${escapeHtml(state.name)}"
                required
              >
            </div>

            <div class="field-group">
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                value="${escapeHtml(state.email)}"
                placeholder="name@example.com"
                autocomplete="email"
                inputmode="email"
                required
              >
            </div>

            <div class="field-group">
              <label for="phone">Phone</label>
              <input
                type="text"
                id="phone"
                name="phone"
                value="${escapeHtml(state.phone)}"
                placeholder="Optional"
              >
            </div>

            <div class="field-group">
              <label for="location">Location</label>
              <input
                type="text"
                id="location"
                name="location"
                value="${escapeHtml(state.location)}"
                placeholder="City or area"
                required
              >
            </div>
          </div>

          <div class="button-row">
            <button type="button" class="secondary-button" id="back-button">Back</button>
            <button type="submit" class="primary-button">Send details</button>
          </div>
        </form>
      </div>

      <a
        href="https://clickandframe.com/start"
        class="back-button"
        role="link"
        aria-label="Back to Start page"
        style="color: #c46749; font-size: 10px;"
        target="_blank"
        rel="noopener noreferrer"
      >Having Trouble? Use the Form</a>
    `;

    document.getElementById("back-button").addEventListener("click", (event) => {
      event.currentTarget.blur();
      state.currentStep -= 1;
      renderStep();
    });

    document.getElementById("contact-form").addEventListener("submit", handleSubmit);
  }

  function renderSuccess() {
    updateProgress(4);

    stepContent.innerHTML = `
      <div class="success-box" role="region" aria-live="polite">
        <h2>Thanks for sharing.</h2>
        <p>We received your details and will reach out with more information, including pricing, examples, and a free consultation invite.</p>
        <p style="margin-top: 12px; font-size: 14px; color: #666;">
          If you don’t see our email, please check your junk or spam folder just in case.
        </p>

        <div class="button-row">
          <button type="button" class="primary-button" id="start-over-button">Start over</button>
        </div>
      </div>
    `;

    document.getElementById("start-over-button").addEventListener("click", (event) => {
      event.currentTarget.blur();
      resetFormState();
      renderStep();
    });
  }

  function resetFormState() {
    state.currentStep = 0;
    state.goal = "";
    state.projectType = "";
    state.extraInfo = "";
    state.name = "";
    state.email = "";
    state.phone = "";
    state.location = "";
    clearError();
  }

  async function handleSubmit(event) {
    event.preventDefault();
    clearError();

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const location = document.getElementById("location").value.trim();

    state.name = name;
    state.email = email;
    state.phone = phone;
    state.location = location;

    if (!name) {
      showError("Please enter your name.");
      return;
    }

    if (!email) {
      showError("Please enter your email.");
      return;
    }

    if (!isValidEmail(email)) {
      showError("Please enter a valid email address.");
      return;
    }

    if (!location) {
      showError("Please enter your location.");
      return;
    }

    const payload = {
      secret: "clickframe2026",
      submitted_at: new Date().toISOString(),
      source: "clickandframe-multistep-form",
      goal: state.goal,
      project_type: state.projectType,
      extra_info: state.extraInfo,
      name: state.name,
      email: state.email,
      phone: state.phone,
      location: state.location
    };

    try {
      setLoading(true);

      const response = await fetch(WEBHOOK_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        throw new Error("Submission failed");
      }

      renderSuccess();
    } catch (error) {
      showError("Something went wrong while sending your details. Please try again.");
    } finally {
      setLoading(false);
    }
  }

  function renderStep() {
    clearError();

    switch (state.currentStep) {
      case 0:
        renderIntro();
        break;

      case 1:
        renderOptionsStep(
          1,
          4,
          "What’s your goal?",
          [
            "Raise funds",
            "Promote a campaign",
            "Tell a story",
            "Grow your audience",
            "I’m not sure"
          ],
          "goal"
        );
        break;

      case 2:
        renderOptionsStep(
          2,
          4,
          "What type of project is this?",
          [
            "Campaign video",
            "Documentary film",
            "Social content",
            "Event video",
            "I’m not sure"
          ],
          "projectType"
        );
        break;

      case 3:
        renderExtraStep();
        break;

      case 4:
        renderContactStep();
        break;

      default:
        renderIntro();
    }
  }

  renderStep();
</script>
</body>
</html>
